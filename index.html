<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作任务看板</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --g1:#15803D; --g2:#16A34A; --g3:#22C55E; --g4:#86EFAC; --g5:#DCFCE7; --g6:#F0FDF4;
  --text:#111827; --muted:#6B7280; --border:#D1FAE5; --card:#fff;
  --s-pending:#F3F4F6; --s-pending-t:#4B5563;
  --s-doing:#EFF6FF; --s-doing-t:#2563EB;
  --s-done:#F0FDF4; --s-done-t:#15803D;
  --s-blocked:#FFF1F2; --s-blocked-t:#BE123C;
}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(150deg,#F0FDF4 0%,#F8FAFC 60%,#ECFDF5 100%);min-height:100vh;color:var(--text)}
.app{max-width:1100px;margin:0 auto;padding:28px 16px 130px}

/* Header */
.header{text-align:center;margin-bottom:28px}
.header h1{font-size:1.7rem;font-weight:800;color:var(--g1);letter-spacing:-.5px}
.header p{color:var(--muted);margin-top:5px;font-size:0.88rem}

/* Card */
.card{background:var(--card);border-radius:16px;padding:22px;box-shadow:0 1px 8px rgba(21,128,61,.08);margin-bottom:18px;border:1px solid #E9F7EF}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
.stat-card{border-radius:12px;padding:16px 10px;text-align:center;color:#fff}
.s-total  {background:#475569}
.s-done   {background:#166534}
.s-doing  {background:#1D4ED8}
.s-blocked{background:#9F1239}
.s-overdue{background:#92400E}
.stat-num{font-size:2rem;font-weight:800;line-height:1}
.stat-label{font-size:0.72rem;opacity:.85;margin-top:4px}

/* Progress */
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.prog-rate{font-size:1.2rem;font-weight:800;color:var(--g1)}
.prog-bar{background:#E5E7EB;border-radius:8px;height:8px;overflow:hidden}
.prog-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--g1),var(--g3));transition:width .6s ease}

/* Section */
.sec-title{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.row-between{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}

/* Table */
.task-table{width:100%;border-collapse:collapse}
.task-table th{text-align:left;padding:9px 14px;font-size:0.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);border-bottom:1px solid #E5E7EB}
.task-table td{padding:12px 14px;border-bottom:1px solid #F9FAFB;font-size:0.86rem;vertical-align:middle}
.task-table tr:last-child td{border-bottom:none}
.task-table tr:hover td{background:#FAFAFA}

/* Badge */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:6px;font-size:0.74rem;font-weight:600;cursor:pointer;white-space:nowrap;border:1px solid transparent}
.b-pending  {background:var(--s-pending);color:var(--s-pending-t);border-color:#D1D5DB}
.b-in-progress{background:var(--s-doing);color:var(--s-doing-t);border-color:#BFDBFE}
.b-completed{background:var(--s-done);color:var(--s-done-t);border-color:#BBF7D0}
.b-blocked  {background:var(--s-blocked);color:var(--s-blocked-t);border-color:#FECDD3}

/* Priority */
.p-high{color:#B91C1C;font-weight:700;font-size:.82rem}
.p-mid {color:#B45309;font-weight:700;font-size:.82rem}
.p-low {color:#166534;font-weight:700;font-size:.82rem}

/* Task name cell */
.task-name{font-weight:600;color:var(--text)}
.task-sub{font-size:.74rem;margin-top:2px;color:var(--muted)}
.task-block{font-size:.74rem;margin-top:2px;color:#BE123C}

/* Assignee chip */
.chip{background:#F0FDF4;color:var(--g1);padding:2px 8px;border-radius:5px;font-size:.8rem;font-weight:600;border:1px solid #BBF7D0}

/* Overdue */
.ov{display:inline-block;padding:1px 5px;background:#FEF3C7;color:#92400E;border-radius:4px;font-size:.68rem;font-weight:700;margin-left:5px}

/* File */
.file-tag{display:inline-flex;align-items:center;gap:2px;background:#EFF6FF;color:#1D4ED8;padding:2px 7px;border-radius:5px;font-size:.72rem;margin:2px;border:1px solid #BFDBFE}

/* Buttons */
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:.85rem;font-weight:600;font-family:inherit;transition:all .15s}
.btn-primary{background:var(--g2);color:#fff}
.btn-primary:hover{background:var(--g1);transform:translateY(-1px)}
.btn-ghost{background:#F3F4F6;color:var(--muted)}
.btn-ghost:hover{background:#E5E7EB}
.btn-del{background:#FFF1F2;color:#BE123C}
.btn-del:hover{background:#FFE4E6}
.btn-sm{padding:4px 10px;font-size:.75rem}
.add-btn{display:flex;align-items:center;gap:6px;background:var(--g2);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.add-btn:hover{background:var(--g1)}

/* Form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.full{grid-column:1/-1}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:.78rem;font-weight:700;color:var(--muted)}
.fg input,.fg select,.fg textarea{padding:8px 12px;border:1.5px solid #D1D5DB;border-radius:8px;font-size:.9rem;font-family:inherit;background:#fff;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--g3)}
.fg textarea{resize:vertical;min-height:68px}
.file-zone{border:1.5px dashed var(--g4);border-radius:8px;padding:16px;text-align:center;cursor:pointer;background:var(--g6);transition:background .15s}
.file-zone:hover{background:#DCFCE7}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:2000;backdrop-filter:blur(3px)}
.modal{background:#fff;border-radius:18px;padding:26px;width:92%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.16)}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-head h2{font-size:1.1rem;font-weight:800;color:var(--g1)}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}

/* Chart */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.chart-legend{display:flex;flex-direction:column;gap:10px}
.leg-item{display:flex;align-items:center;gap:8px;font-size:.83rem}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.leg-count{margin-left:auto;font-weight:700;color:var(--text);padding-left:16px}
.pri-bar-wrap{margin-bottom:12px}
.pri-bar-label{display:flex;justify-content:space-between;margin-bottom:4px;font-size:.8rem}
.pri-bar-bg{background:#F3F4F6;border-radius:5px;height:7px;overflow:hidden}
.pri-bar-fill{height:100%;border-radius:5px;transition:width .5s ease}
.summary-box{background:var(--g6);border-radius:10px;padding:14px;border:1px solid var(--border);margin-top:16px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.summary-cell{text-align:center;background:#fff;border-radius:8px;padding:9px;border:1px solid #E5E7EB}
.summary-num{font-size:1.3rem;font-weight:800}
.summary-lbl{font-size:.7rem;color:#9CA3AF}

/* Empty */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}

/* Toast */
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast{position:fixed;top:18px;right:18px;z-index:9999;padding:11px 18px;border-radius:10px;background:#fff;box-shadow:0 6px 24px rgba(0,0,0,.12);display:flex;align-items:center;gap:7px;animation:slideIn .25s ease;font-size:.85rem;font-weight:600;border-left:3px solid var(--g2)}

/* ========= ROBOT v3 ========= */
@keyframes rvFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes rvBlink{0%,80%,100%{transform:scaleY(1)}87%{transform:scaleY(0.06)}}
@keyframes rvTilt{0%,58%,100%{transform:rotate(0deg) translateX(-50%)}70%{transform:rotate(-22deg) translateX(-50%)}84%{transform:rotate(15deg) translateX(-50%)}}
@keyframes rvLens{0%,100%{box-shadow:0 0 8px rgba(91,192,232,.5)}50%{box-shadow:0 0 18px rgba(91,192,232,.95),0 0 5px #fff}}
@keyframes rvRipple{0%{transform:scale(.8);opacity:1}100%{transform:scale(2.4);opacity:0}}
@keyframes rvLed{0%,100%{opacity:1;box-shadow:0 0 5px currentColor}50%{opacity:.15;box-shadow:none}}
@keyframes rvArmLIdle{0%,100%{transform:rotate(22deg)}50%{transform:rotate(12deg)}}
@keyframes rvArmRIdle{0%,100%{transform:rotate(-22deg)}50%{transform:rotate(-12deg)}}
@keyframes rvArmLTalk{0%{transform:rotate(-65deg)}35%{transform:rotate(-20deg)}65%{transform:rotate(-50deg)}100%{transform:rotate(-65deg)}}
@keyframes rvArmRTalk{0%,100%{transform:rotate(-55deg)}50%{transform:rotate(15deg)}}
@keyframes rvBodyBob{0%,100%{transform:translateY(0)}45%{transform:translateY(-5px)}}
@keyframes rvHeadNod{0%,100%{transform:rotate(0)}50%{transform:rotate(-9deg)}}
@keyframes rvWheelSpin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

.av-wrap{position:fixed;bottom:26px;right:26px;z-index:1000;cursor:pointer;user-select:none}
.av-bubble{position:absolute;bottom:158px;right:0;background:#fff;border-radius:14px 14px 0 14px;padding:10px 13px;width:178px;font-size:.78rem;line-height:1.5;color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,.1);border:1.5px solid #FDE68A;animation:rvFloat 3.2s ease-in-out infinite}
.av-ripple{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:120px;height:120px;border-radius:50%;background:rgba(212,152,10,.14);animation:rvRipple 1.4s ease-out infinite;pointer-events:none}

/* Character container */
.rv{width:110px;height:158px;position:relative;overflow:visible;animation:rvFloat 3.2s ease-in-out infinite;filter:drop-shadow(0 10px 24px rgba(150,100,0,.3))}

/* ── Big wheels ── */
.rv-wheel{position:absolute;bottom:0;width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#444,#181818);border:3px solid #2A2A2A;box-shadow:inset 0 0 0 6px #1E1E1E,0 3px 8px rgba(0,0,0,.5)}
.rv-wheel.l{left:2px}
.rv-wheel.r{right:2px}
/* Hub */
.rv-hub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:15px;height:15px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#666,#333);border:2px solid #777}
/* Spokes */
.rv-spoke{position:absolute;top:50%;left:50%;background:#2E2E2E;border-radius:2px}
.rv-spoke.h{width:36px;height:3px;transform:translate(-50%,-50%)}
.rv-spoke.v{width:3px;height:36px;transform:translate(-50%,-50%)}
/* Axle bar */
.rv-axle{position:absolute;bottom:21px;left:24px;right:24px;height:5px;background:#222;border-radius:3px;box-shadow:0 2px 4px rgba(0,0,0,.4)}

/* ── Body ── */
.rv-body{position:absolute;bottom:42px;left:16px;width:78px;height:52px;background:linear-gradient(155deg,#FFE040 0%,#FFC107 55%,#E6A000 100%);border-radius:8px;border:2.5px solid #C88A00;box-shadow:inset 0 2px 0 rgba(255,255,255,.22),inset 0 -2px 0 rgba(0,0,0,.16)}
.rv-body::before{content:'';position:absolute;top:50%;left:6px;right:6px;height:1px;background:rgba(0,0,0,.18)}
.rv-bp{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:48px;height:20px;background:#111;border-radius:4px;border:1.5px solid #FFD700;display:flex;align-items:center;justify-content:center;gap:8px}
.rv-led{width:9px;height:9px;border-radius:50%}
.rv-led.r{color:#E74C3C;background:#E74C3C;box-shadow:0 0 5px #E74C3C;animation:rvLed 1.4s ease-in-out infinite}
.rv-led.g{color:#2ECC71;background:#2ECC71;box-shadow:0 0 5px #2ECC71;animation:rvLed 2s ease-in-out infinite .65s}

/* ── Head ── */
.rv-head{position:absolute;bottom:92px;left:16px;width:78px;height:46px;background:linear-gradient(145deg,#FFE040,#FFC107);border-radius:8px;border:2.5px solid #C88A00;box-shadow:inset 0 2px 0 rgba(255,255,255,.2),inset 0 -1px 0 rgba(0,0,0,.14);overflow:visible}
.rv-head::after{content:'';position:absolute;bottom:10px;left:8px;right:8px;height:1px;background:rgba(0,0,0,.15)}
.rv-rv{position:absolute;width:5px;height:5px;background:#B8860B;border-radius:50%;top:5px}
.rv-rv.l{left:6px}
.rv-rv.r{right:6px}
/* VU speaker bars */
.rv-grille{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);display:flex;gap:3px;align-items:flex-end}
.rv-bar{width:3px;background:rgba(0,0,0,.3);border-radius:1px;min-height:2px;transition:height .09s}

/* ── Big binocular eyes (36px) ── */
.rv-eyes{position:absolute;top:-40px;left:50%;transform:translateX(-50%);display:flex;gap:5px;transform-origin:50% 100%}
.rv-eyes.tilt{animation:rvTilt 5.5s ease-in-out infinite 1.5s}
.rv-ebridge{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:62px;height:6px;background:#2A2A2A;border-radius:3px;z-index:0}
.rv-eu{width:36px;height:36px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#545454,#1A1A1A);border:3.5px solid #3C3C3C;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 10px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.1);position:relative;z-index:1}
.rv-iris{width:26px;height:26px;border-radius:50%;background:#050D15;display:flex;align-items:center;justify-content:center;animation:rvBlink 5.5s ease-in-out infinite}
.rv-lens{width:17px;height:17px;border-radius:50%;background:radial-gradient(circle at 32% 28%,#D8EEFA,#5BC0E8 38%,#1267A8 78%,#062840 100%);box-shadow:0 0 10px rgba(91,192,232,.65);position:relative;animation:rvLens 2.8s ease-in-out infinite}
.rv-lens::after{content:'';position:absolute;width:5px;height:5px;background:rgba(255,255,255,.9);border-radius:50%;top:2px;right:2px}

/* ── Silver mechanical arms ── */
/* Each arm is an absolutely positioned container, rotates from top (shoulder) */
.rv-arm{position:absolute;width:14px;height:66px;transform-origin:top center}
.rv-arm.l{bottom:76px;left:4px;animation:rvArmLIdle 3s ease-in-out infinite}
.rv-arm.r{bottom:76px;right:4px;animation:rvArmRIdle 3s ease-in-out infinite .7s}
/* Shoulder ball joint */
.rv-shoulder{position:absolute;top:0;left:50%;transform:translateX(-50%);width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 35% 28%,#E8E8E8,#9A9A9A);border:1.5px solid #777;box-shadow:0 2px 4px rgba(0,0,0,.3)}
/* Upper arm segment */
.rv-ua{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:9px;height:24px;background:linear-gradient(to right,#D6D6D6,#A8A8A8,#D6D6D6);border-radius:4px;border:1px solid #888;box-shadow:1px 0 0 rgba(255,255,255,.35),-1px 0 0 rgba(0,0,0,.2)}
/* Elbow joint */
.rv-elbow{position:absolute;top:32px;left:50%;transform:translateX(-50%);width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 35% 28%,#E0E0E0,#888);border:1.5px solid #777;box-shadow:0 2px 3px rgba(0,0,0,.3)}
/* Forearm segment */
.rv-fa{position:absolute;top:41px;left:50%;transform:translateX(-50%);width:8px;height:18px;background:linear-gradient(to right,#D6D6D6,#A8A8A8,#D6D6D6);border-radius:4px;border:1px solid #888;box-shadow:1px 0 0 rgba(255,255,255,.3),-1px 0 0 rgba(0,0,0,.18)}
/* Claw / gripper */
.rv-claw{position:absolute;top:57px;left:50%;transform:translateX(-50%);width:18px;height:10px;display:flex;justify-content:space-between;align-items:flex-start}
.rv-cp{width:7px;height:11px;background:linear-gradient(#CECECE,#888);border-radius:0 0 4px 4px;border:1px solid #777;box-shadow:inset 0 1px 0 rgba(255,255,255,.3)}
.rv-cp.l{transform:rotate(-16deg);transform-origin:top center}
.rv-cp.r{transform:rotate(16deg);transform-origin:top center}

/* ── Talking state overrides ── */
.rv.talking .rv-arm.l{animation:rvArmLTalk .5s ease-in-out infinite!important}
.rv.talking .rv-arm.r{animation:rvArmRTalk .44s ease-in-out infinite .22s!important}
.rv.talking .rv-body{animation:rvBodyBob .42s ease-in-out infinite}
.rv.talking .rv-head{animation:rvHeadNod .55s ease-in-out infinite}
.rv.talking .rv-wheel{animation:rvWheelSpin 1s linear infinite}

/* ── Voice Float (bottom center) ── */
@keyframes vfPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.45),0 4px 20px rgba(239,68,68,.35)}70%{box-shadow:0 0 0 18px rgba(239,68,68,0),0 4px 20px rgba(239,68,68,.3)}}
@keyframes vfIdle{0%,100%{box-shadow:0 4px 22px rgba(21,128,61,.45)}50%{box-shadow:0 4px 30px rgba(21,128,61,.75)}}
.vf-wrap{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:990;display:flex;flex-direction:column;align-items:center;gap:8px;user-select:none;-webkit-user-select:none}
.vf-status{background:rgba(255,255,255,.96);border-radius:20px;padding:5px 15px;font-size:.76rem;font-weight:700;color:#374151;box-shadow:0 2px 12px rgba(0,0,0,.1);white-space:nowrap;max-width:220px;text-align:center;border:1.5px solid #E5E7EB;transition:all .2s}
.vf-status.rec{color:#DC2626;border-color:#FECACA;background:rgba(255,240,240,.97)}
.vf-status.proc{color:#1D4ED8;border-color:#BFDBFE;background:rgba(239,246,255,.97)}
.vf-btn{width:66px;height:66px;border-radius:50%;background:linear-gradient(145deg,#22C55E,#15803D);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.65rem;animation:vfIdle 2.5s ease-in-out infinite;transition:transform .15s,background .15s;outline:none;-webkit-tap-highlight-color:transparent;touch-action:none}
.vf-btn.rec{background:linear-gradient(145deg,#F87171,#DC2626)!important;animation:vfPulse .85s ease-in-out infinite!important;transform:scale(1.13)}
.vf-btn.proc{background:linear-gradient(145deg,#60A5FA,#2563EB)!important;animation:vfIdle 1.1s ease-in-out infinite!important}
.vf-bars{display:flex;gap:3px;align-items:flex-end;height:22px}
.vf-bar{width:4px;background:rgba(255,255,255,.85);border-radius:2px;min-height:3px}
.vf-key-btn{position:absolute;top:-5px;right:-10px;width:23px;height:23px;border-radius:50%;background:#fff;border:1.5px solid #E5E7EB;font-size:.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 5px rgba(0,0,0,.12);padding:0}
.vf-key-panel{position:absolute;bottom:86px;left:50%;transform:translateX(-50%);z-index:20;background:#fff;border-radius:14px;padding:14px 16px;width:218px;box-shadow:0 8px 30px rgba(0,0,0,.14);border:1.5px solid #E5E7EB}
.vf-key-panel p{font-size:.75rem;color:#374151;margin:0 0 9px;font-weight:600;line-height:1.45}
.vf-key-panel input{width:100%;box-sizing:border-box;padding:7px 9px;border-radius:7px;border:1.5px solid #D1D5DB;font-size:.74rem;outline:none;font-family:inherit;color:#111}
.vf-key-panel input:focus{border-color:#22C55E}
.vf-key-acts{display:flex;gap:7px;margin-top:9px}
.vf-key-acts button{flex:1;padding:6px 0;border-radius:7px;border:none;cursor:pointer;font-size:.76rem;font-weight:700;font-family:inherit}
.vf-key-acts button.ok{background:#22C55E;color:#fff}
.vf-key-acts button.cancel{background:#F3F4F6;color:#555}
.vf-picker{position:absolute;bottom:86px;left:50%;transform:translateX(-50%);z-index:21;background:#fff;border-radius:14px;padding:14px 14px 10px;width:270px;box-shadow:0 8px 32px rgba(0,0,0,.16);border:1.5px solid #E5E7EB}
.vf-picker-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.vf-picker-head span{font-size:.8rem;font-weight:700;color:#111827}
.vf-picker-head button{background:none;border:none;cursor:pointer;font-size:.85rem;color:#9CA3AF;padding:0}
.vf-voice-list{display:flex;flex-direction:column;gap:4px;max-height:240px;overflow-y:auto}
.vf-voice-item{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:9px;cursor:pointer;border:1.5px solid transparent;transition:all .12s}
.vf-voice-item:hover{background:#F9FAFB}
.vf-voice-item.active{background:#F0FDF4;border-color:#86EFAC}
.vf-voice-info{flex:1;display:flex;flex-direction:column;gap:2px}
.vf-voice-name{font-size:.76rem;font-weight:600;color:#111827}

const SCOL={pending:'#9CA3AF','in-progress':'#3B82F6',completed:'#16A34A',blocked:'#E11D48'};

/* Donut */
function Donut({tasks}){
  const cnt={pending:0,'in-progress':0,completed:0,blocked:0};
  tasks.forEach(t=>cnt[t.status]=(cnt[t.status]||0)+1);
  const total=tasks.length||1,sz=126,r=46,cx=sz/2,cy=sz/2,circ=2*Math.PI*r;
  let off=0;
  const segs=Object.entries(cnt).map(([k,v])=>{
    const pct=v/total,d=pct*circ,g=circ-d,o=off*circ;
    off+=pct; return {k,v,color:SCOL[k],d,g,o};
  });
  return(
    <div style={{display:'flex',alignItems:'center',gap:22,flexWrap:'wrap'}}>
      <svg width={sz} height={sz}>
        {tasks.length===0
          ?<circle cx={cx} cy={cy} r={r} fill="none" stroke="#E5E7EB" strokeWidth={16}/>
          :segs.map(s=><circle key={s.k} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth={16}
              strokeDasharray={`${s.d} ${s.g}`} strokeDashoffset={-s.o}
              transform={`rotate(-90 ${cx} ${cy})`} style={{transition:'stroke-dasharray .5s'}}/>)}
        <text x={cx} y={cy-5} textAnchor="middle" fontSize="19" fontWeight="800" fill="#111827">{tasks.length}</text>
        <text x={cx} y={cy+11} textAnchor="middle" fontSize="9" fill="#9CA3AF">总任务数</text>
      </svg>
      <div className="chart-legend">
        {Object.entries(cnt).map(([k,v])=>(
          <div key={k} className="leg-item">
            <div className="leg-dot" style={{background:SCOL[k]}}/>
            <span style={{color:'#6B7280'}}>{S[k].label}</span>
            <span className="leg-count">{v}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* shared TTS helper — uses saved voice, pitch=2 */
function makeTTS(text,{pitch=2,rate=1.1}={}){
  return new Promise(resolve=>{
    if(!window.speechSynthesis){resolve();return;}
    window.speechSynthesis.cancel();
    const utt=new SpeechSynthesisUtterance(text);
    utt.lang='zh-CN';utt.rate=rate;utt.pitch=pitch;utt.volume=1;
    utt.onend=resolve;utt.onerror=resolve;
    const savedName=localStorage.getItem('rv_voice_name');
    const apply=()=>{
      const vs=window.speechSynthesis.getVoices();
      let v=savedName?vs.find(x=>x.name===savedName):null;
      if(!v) v=vs.find(x=>x.lang.startsWith('zh')&&(x.name.includes('XiaoXiao')||x.name.includes('Tingting')))||
                vs.find(x=>x.lang.startsWith('zh')&&(x.name.includes('Xiao')||x.name.includes('Female')||x.name.includes('女')))||
                vs.find(x=>x.lang.startsWith('zh'));
      if(v) utt.voice=v;
      window.speechSynthesis.speak(utt);
    };
    const vs=window.speechSynthesis.getVoices();
    if(vs.length>0) apply();
    else window.speechSynthesis.addEventListener('voiceschanged',apply,{once:true});
  });
}

/* Voice Picker — lists all zh voices for selection */
function VoicePicker({onClose}){
  const [voices,setVoices]=useState([]);
  const [sel,setSel]=useState(()=>localStorage.getItem('rv_voice_name')||'');
  const [previewing,setPreviewing]=useState('');

  useEffect(()=>{
    const load=()=>{
      const vs=window.speechSynthesis.getVoices().filter(v=>v.lang.startsWith('zh'));
      setVoices(vs);
    };
    load();
    window.speechSynthesis.addEventListener('voiceschanged',load);
    return()=>window.speechSynthesis.removeEventListener('voiceschanged',load);
  },[]);

  const preview=(v)=>{
    window.speechSynthesis.cancel();
    setPreviewing(v.name);
    const utt=new SpeechSynthesisUtterance('你好老板，我是你的专属助手！');
    utt.voice=v;utt.lang=v.lang;utt.pitch=2;utt.rate=1.1;utt.volume=1;
    utt.onend=()=>setPreviewing('');
    window.speechSynthesis.speak(utt);
  };

  const pick=(v)=>{

    setSel(v.name);

  return(

      <div className="vf-voice-list">
        {voices.map(v=>(
          <div key={v.name} className={`vf-voice-item${sel===v.name?' active':''}`} onClick={()=>pick(v)}>
            <div className="vf-voice-info">

              <span className="vf-voice-lang">{v.lang}</span>

            <button className={`vf-preview-btn${previewing===v.name?' playing':''}`}
              onClick={e=>{e.stopPropagation();preview(v);}}>
              {previewing===v.name?'▶':'试听'}
            </button>
          </div>

      </div>
      <div style={{fontSize:'.7rem',color:'#9CA3AF',marginTop:8,textAlign:'center'}}>点击行选择 · 试听按钮预览</div>

/* shared beep */
function beepFn(freq,dur,delay=0){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type='sine';osc.frequency.setValueAtTime(freq,ctx.currentTime+delay);
    gain.gain.setValueAtTime(0,ctx.currentTime+delay);
    gain.gain.linearRampToValueAtTime(0.18,ctx.currentTime+delay+0.01);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+dur);
    osc.start(ctx.currentTime+delay);osc.stop(ctx.currentTime+delay+dur+0.05);
  }catch(e){}
}

/* WALL-E Avatar — click to hear report */
function Avatar({tasks}){
  const [talking,setTalking]=useState(false);
  const [tilt,setTilt]=useState(false);
  const [ripple,setRipple]=useState(false);
  const [bubble,setBubble]=useState('嘟嘟~ 点我听汇报');
  const [bars,setBars]=useState([2,4,2,4,2]);
  const barTimerRef=useRef(null);

  const genReport=()=>{
    const total=tasks.length;
    if(!total) return '老板好，目前暂无任务，可以点击新建任务开始工作规划。';
    const done=tasks.filter(t=>t.status==='completed').length;
    const doing=tasks.filter(t=>t.status==='in-progress').length;
    const blocked=tasks.filter(t=>t.status==='blocked').length;
    const pending=tasks.filter(t=>t.status==='pending').length;
    const rate=Math.round(done/total*100);
    const today=new Date();today.setHours(0,0,0,0);
    const overdue=tasks.filter(t=>t.status!=='completed'&&t.deadline&&new Date(t.deadline)<today);
    let r=`老板您好，以下是当前工作汇报。共${total}项任务，完成率${rate}%。已完成${done}项，进行中${doing}项，未开始${pending}项。`;
    if(blocked>0){r+=`有${blocked}项卡点，请关注：`;tasks.filter(t=>t.status==='blocked').forEach(t=>{r+=t.blocker?`${t.name}，原因${t.blocker}。`:`${t.name}原因待补充。`;});}
    if(overdue.length>0) r+=`另有${overdue.length}项逾期，建议跟进。`;
    if(rate===100) r+='全部完成，辛苦啦！';
    else if(rate>=70) r+='整体正常，请放心。';
    else r+='团队会加快推进，请稍等。';
    return r;
  };

  const speak=async()=>{
    if(talking){window.speechSynthesis.cancel();clearInterval(barTimerRef.current);setTalking(false);setRipple(false);setBars([2,4,2,4,2]);setBubble('嘟嘟~ 点我听汇报');return;}
    beepFn(880,.08,0);beepFn(1047,.08,.12);beepFn(1319,.08,.24);beepFn(1568,.15,.36);
    setTilt(true);setRipple(true);
    const total=tasks.length,done=tasks.filter(t=>t.status==='completed').length;
    setBubble(total===0?'暂无任务，快添加！':`${total}项任务 · 完成${Math.round(done/(total||1)*100)}%`);
    await new Promise(r=>setTimeout(r,560));
    setTalking(true);
    barTimerRef.current=setInterval(()=>setBars([...Array(5)].map(()=>Math.floor(Math.random()*7)+2)),130);
    await makeTTS(genReport());
    clearInterval(barTimerRef.current);setTalking(false);setRipple(false);setBars([2,4,2,4,2]);
    beepFn(880,.08,0);beepFn(659,.08,.11);beepFn(523,.22,.22);
    setBubble('汇报完毕 ✅');
    setTimeout(()=>{setTilt(false);setBubble('嘟嘟~ 点我听汇报');},3000);
  };

  return(
    <div className="av-wrap" onClick={speak} title="点击听工作汇报">
      <div className="av-bubble">{bubble}</div>
      {ripple&&<div className="av-ripple"/>}
      <div className={`rv${talking?' talking':''}`}>
        <div className="rv-wheel l"><div className="rv-hub"/><div className="rv-spoke h"/><div className="rv-spoke v"/></div>
        <div className="rv-wheel r"><div className="rv-hub"/><div className="rv-spoke h"/><div className="rv-spoke v"/></div>
        <div className="rv-axle"/>
        <div className="rv-arm l"><div className="rv-shoulder"/><div className="rv-ua"/><div className="rv-elbow"/><div className="rv-fa"/><div className="rv-claw"><div className="rv-cp l"/><div className="rv-cp r"/></div></div>
        <div className="rv-arm r"><div className="rv-shoulder"/><div className="rv-ua"/><div className="rv-elbow"/><div className="rv-fa"/><div className="rv-claw"><div className="rv-cp l"/><div className="rv-cp r"/></div></div>
        <div className="rv-body"><div className="rv-bp"><div className="rv-led r"/><div className="rv-led g"/></div></div>
        <div className="rv-head">
          <div className="rv-rv l"/><div className="rv-rv r"/>
          <div className={`rv-eyes${tilt?' tilt':''}`}>
            <div className="rv-ebridge"/>
            <div className="rv-eu"><div className="rv-iris"><div className="rv-lens"/></div></div>
            <div className="rv-eu"><div className="rv-iris"><div className="rv-lens"/></div></div>
          </div>
          <div className="rv-grille">{bars.map((h,i)=><div key={i} className="rv-bar" style={{height:`${h}px`}}/>)}</div>
        </div>
      </div>
    </div>
  );
}

/* Voice Float — press & hold to talk with AI */
function VoiceFloat({tasks}){
  const [phase,setPhase]=useState('idle'); // idle | rec | proc | talking
  const [status,setStatus]=useState('按住说话');
  const [bars,setBars]=useState([3,5,3,5,3]);
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem('rv_api_key')||'');
  const [showKey,setShowKey]=useState(false);
  const [showVoice,setShowVoice]=useState(false);
  const [keyDraft,setKeyDraft]=useState('');
  const recogRef=useRef(null);
  const barTimerRef=useRef(null);
  const pressedRef=useRef(false);

  const startBars=()=>{barTimerRef.current=setInterval(()=>setBars([...Array(5)].map(()=>Math.floor(Math.random()*9)+2)),110);};
  const stopBars=()=>{clearInterval(barTimerRef.current);setBars([3,5,3,5,3]);};

  const askAI=async(q)=>{
    const ctx=tasks.map(t=>`${t.name}(${t.assignee},${t.status},截止${t.deadline}${t.blocker?',卡点:'+t.blocker:''})`).join(';');
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'x-api-key':apiKey,'anthropic-version':'2023-06-01','content-type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',max_tokens:150,
        system:`你是可爱的工作助手机器人小助手。当前任务数据：${ctx}。用简短温暖可爱的语气回答老板，不超过60字，中文回答。`,
        messages:[{role:'user',content:q}]
      })
    });
    const d=await res.json();
    if(d.error) throw new Error(d.error.message);
    return d.content[0].text;
  };

  const handlePress=e=>{
    e.preventDefault();
    if(phase!=='idle') return;
    if(!apiKey){setKeyDraft('');setShowKey(true);return;}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setStatus('浏览器不支持语音识别');setTimeout(()=>setStatus('按住说话'),2000);return;}
    pressedRef.current=true;
    window.speechSynthesis.cancel();
    const r=new SR();r.lang='zh-CN';r.interimResults=false;r.maxAlternatives=1;
    recogRef.current=r;
    setPhase('rec');setStatus('松开发送 🎙️');
    startBars();
    beepFn(1047,.05,0);beepFn(1319,.05,.1);
    r.onresult=async ev=>{
      pressedRef.current=false;
      const q=ev.results[0][0].transcript;
      stopBars();setPhase('proc');setStatus(`"${q}"`);
      try{
        const ans=await askAI(q);
        setPhase('talking');setStatus(ans.length>22?ans.slice(0,22)+'…':ans);
        startBars();
        beepFn(1047,.05,0);beepFn(1319,.06,.1);
        await makeTTS(ans);
        stopBars();setPhase('idle');setStatus('按住说话');
      }catch(err){
        stopBars();setPhase('idle');
        setStatus('AI出错，检查Key ⚙️');
        setTimeout(()=>setStatus('按住说话'),3000);
      }
    };
    r.onerror=()=>{stopBars();setPhase('idle');setStatus('没听清，再试试');setTimeout(()=>setStatus('按住说话'),2000);};
    r.onend=()=>{if(pressedRef.current){pressedRef.current=false;}};
    r.start();
  };

  const handleRelease=e=>{
    e.preventDefault();
    if(phase==='rec'&&recogRef.current){pressedRef.current=false;recogRef.current.stop();}
  };

  const saveKey=()=>{const k=keyDraft.trim();if(k){localStorage.setItem('rv_api_key',k);setApiKey(k);}setShowKey(false);};

  const btnClass=`vf-btn${phase==='rec'?' rec':''}${phase==='proc'||phase==='talking'?' proc':''}`;
  const statusClass=`vf-status${phase==='rec'?' rec':''}${phase==='proc'?' proc':''}`;

  return(
    <div className="vf-wrap">
      {showKey&&(
        <div className="vf-key-panel">
          <p>输入 Claude API Key<br/>开启语音问答</p>
          <input value={keyDraft} onChange={e=>setKeyDraft(e.target.value)} placeholder="sk-ant-..." onKeyDown={e=>e.key==='Enter'&&saveKey()}/>
          <div className="vf-key-acts">
            <button className="ok" onClick={saveKey}>确定</button>
            <button className="cancel" onClick={()=>setShowKey(false)}>取消</button>
          </div>
          <div style={{marginTop:10,borderTop:'1px solid #F3F4F6',paddingTop:10}}>
            <button style={{width:'100%',padding:'6px 0',borderRadius:7,border:'1.5px solid #E5E7EB',background:'#F9FAFB',cursor:'pointer',fontSize:'.75rem',fontWeight:700,fontFamily:'inherit',color:'#374151'}}
              onClick={()=>{setShowKey(false);setShowVoice(true);}}>🎵 选择语音包</button>
          </div>
        </div>
      )}
      {showVoice&&<VoicePicker onClose={()=>setShowVoice(false)}/>}
      <div className={statusClass}>{status}</div>
      <div style={{position:'relative',display:'inline-block'}}>
        <button className={btnClass}
          onMouseDown={handlePress} onMouseUp={handleRelease} onMouseLeave={handleRelease}
          onTouchStart={handlePress} onTouchEnd={handleRelease} onTouchCancel={handleRelease}>
          {phase==='idle'?'🎙️':phase==='proc'?'🤔':(
            <div className="vf-bars">{bars.map((h,i)=><div key={i} className="vf-bar" style={{height:`${h}px`}}/>)}</div>
          )}
        </button>
        <button className="vf-key-btn" onClick={e=>{e.stopPropagation();if(showVoice){setShowVoice(false);}else{setKeyDraft(apiKey);setShowKey(v=>!v);}}} title="设置">⚙️</button>
      </div>
    </div>
  );
}

/* Task Form */
function TaskForm({task,onSave,onClose}){
  const [f,setF]=useState(task||{name:'',assignee:'',deadline:'',priority:'mid',status:'pending',blocker:'',files:[],notes:''});
  const fileRef=useRef(null);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const onFile=e=>{const ns=Array.from(e.target.files).map(x=>x.name);setF(p=>({...p,files:[...p.files,...ns]}));};
  const submit=e=>{e.preventDefault();if(!f.name.trim())return;onSave({...f,id:task?.id||Date.now(),createdAt:task?.createdAt||new Date().toISOString().split('T')[0]});};
  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-head">
          <h2>{task?'编辑任务':'新建任务'}</h2>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        <form onSubmit={submit}>
          <div className="form-grid">
            <div className="fg full"><label>任务名称 *</label><input type="text" placeholder="请输入任务名称" value={f.name} onChange={e=>set('name',e.target.value)} required/></div>
            <div className="fg"><label>负责人</label><input type="text" placeholder="负责人姓名" value={f.assignee} onChange={e=>set('assignee',e.target.value)}/></div>
            <div className="fg"><label>截止日期</label><input type="date" value={f.deadline} onChange={e=>set('deadline',e.target.value)}/></div>
            <div className="fg"><label>优先级</label>
              <select value={f.priority} onChange={e=>set('priority',e.target.value)}>
                <option value="high">高优先级</option><option value="mid">中优先级</option><option value="low">低优先级</option>
              </select>
            </div>
            <div className="fg"><label>完成状态</label>
              <select value={f.status} onChange={e=>set('status',e.target.value)}>
                <option value="pending">未开始</option><option value="in-progress">进行中</option><option value="completed">已完成</option><option value="blocked">已卡点</option>
              </select>
            </div>
            {f.status==='blocked'&&<div className="fg full"><label>卡点描述</label><textarea placeholder="描述卡点原因及所需支持..." value={f.blocker} onChange={e=>set('blocker',e.target.value)}/></div>}
            <div className="fg full"><label>备注反馈</label><textarea placeholder="进展说明、备注信息..." value={f.notes} onChange={e=>set('notes',e.target.value)}/></div>
            <div className="fg full"><label>上传交付文件</label>
              <div className="file-zone" onClick={()=>fileRef.current?.click()}>
                <input ref={fileRef} type="file" multiple style={{display:'none'}} onChange={onFile}/>
                <div style={{color:'#16A34A',fontWeight:700,marginBottom:2}}>📎 点击上传交付文件</div>
                <div style={{color:'#9CA3AF',fontSize:'.75rem'}}>支持多文件</div>
              </div>
              {f.files.length>0&&<div style={{marginTop:7}}>{f.files.map((n,i)=><span key={i} className="file-tag">📄 {n.length>22?n.slice(0,22)+'…':n}<span style={{cursor:'pointer',color:'#BE123C',marginLeft:3}} onClick={e=>{e.stopPropagation();setF(p=>({...p,files:p.files.filter((_,j)=>j!==i)}));}}>✕</span></span>)}</div>}
            </div>
          </div>
          <div className="modal-foot">
            <button type="button" className="btn btn-ghost" onClick={onClose}>取消</button>
            <button type="submit" className="btn btn-primary">{task?'保存修改':'创建任务'}</button>
          </div>
        </form>
      </div>
    </div>
  );
}

function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,2500);return()=>clearTimeout(t);},[]);
  return <div className="toast">✓ {msg}</div>;
}

function App(){
  const [tasks,setTasks]=useState(()=>{try{const s=localStorage.getItem('tkv3');return s?JSON.parse(s):DEMO;}catch{return DEMO;}});
  const [showForm,setShowForm]=useState(false);
  const [editTask,setEditTask]=useState(null);
  const [toast,setToast]=useState(null);

  useEffect(()=>{localStorage.setItem('tkv3',JSON.stringify(tasks));},[tasks]);

  const notify=msg=>setToast(msg);
  const save=t=>{
    if(editTask){setTasks(p=>p.map(x=>x.id===t.id?t:x));notify('任务已更新');}
    else{setTasks(p=>[...p,t]);notify('任务已创建');}
    setShowForm(false);setEditTask(null);
  };
  const del=id=>{if(confirm('确认删除此任务？')){setTasks(p=>p.filter(t=>t.id!==id));notify('已删除');}};
  const cycle=id=>setTasks(p=>p.map(t=>{if(t.id!==id)return t;const i=(SCYCLE.indexOf(t.status)+1)%SCYCLE.length;return{...t,status:SCYCLE[i]};}));

  const today=new Date();today.setHours(0,0,0,0);
  const total=tasks.length;
  const done=tasks.filter(t=>t.status==='completed').length;
  const doing=tasks.filter(t=>t.status==='in-progress').length;
  const blocked=tasks.filter(t=>t.status==='blocked').length;
  const overdue=tasks.filter(t=>t.status!=='completed'&&t.deadline&&new Date(t.deadline)<today).length;
  const rate=total?Math.round(done/total*100):0;

  return(
    <div className="app">
      <div className="header">
        <h1>工作任务看板</h1>
        <p>任务追踪 · 进度管理 · 交付物上传 · 卡点反馈</p>
      </div>

      <div className="stats-grid">
        <div className="stat-card s-total"><div className="stat-num">{total}</div><div className="stat-label">全部任务</div></div>
        <div className="stat-card s-done"><div className="stat-num">{done}</div><div className="stat-label">已完成</div></div>
        <div className="stat-card s-doing"><div className="stat-num">{doing}</div><div className="stat-label">进行中</div></div>
        <div className="stat-card s-blocked"><div className="stat-num">{blocked}</div><div className="stat-label">已卡点</div></div>
        <div className="stat-card s-overdue"><div className="stat-num">{overdue}</div><div className="stat-label">逾期中</div></div>
      </div>

      <div className="card">
        <div className="prog-row"><span style={{fontWeight:700,fontSize:'.9rem'}}>整体完成率</span><span className="prog-rate">{rate}%</span></div>
        <div className="prog-bar"><div className="prog-fill" style={{width:`${rate}%`}}/></div>
      </div>

      <div className="card">
        <div className="row-between">
          <div className="sec-title">任务列表</div>
          <button className="add-btn" onClick={()=>{setEditTask(null);setShowForm(true);}}>＋ 新建任务</button>
        </div>
        {tasks.length===0?(
          <div className="empty"><div style={{fontSize:'2.5rem',marginBottom:10}}>📋</div><div style={{fontWeight:600,marginBottom:4}}>暂无任务</div><div style={{fontSize:'.83rem'}}>点击「新建任务」开始添加</div></div>
        ):(
          <>
            <div style={{overflowX:'auto'}}>
              <table className="task-table">
                <thead><tr><th>任务</th><th>负责人</th><th>截止日期</th><th>优先级</th><th>状态</th><th>交付文件</th><th></th></tr></thead>
                <tbody>
                  {tasks.map(t=>{
                    const ov=t.status!=='completed'&&t.deadline&&new Date(t.deadline)<today;
                    return(
                      <tr key={t.id}>
                        <td style={{maxWidth:260}}>
                          <div className="task-name">{t.name}</div>
                          {t.status==='blocked'&&t.blocker&&<div className="task-block">▲ {t.blocker}</div>}
                          {t.notes&&<div className="task-sub">{t.notes.length>48?t.notes.slice(0,48)+'…':t.notes}</div>}
                        </td>
                        <td><span className="chip">{t.assignee||'—'}</span></td>
                        <td style={{whiteSpace:'nowrap',fontSize:'.82rem'}}>
                          {t.deadline?new Date(t.deadline).toLocaleDateString('zh-CN'):'—'}
                          {ov&&<span className="ov">逾期</span>}
                        </td>
                        <td><span className={P[t.priority]?.cls}>{P[t.priority]?.e} {P[t.priority]?.label}</span></td>
                        <td><span className={`badge ${S[t.status]?.cls}`} onClick={()=>cycle(t.id)} title="点击切换状态">{S[t.status]?.emoji} {S[t.status]?.label}</span></td>
                        <td style={{minWidth:80}}>
                          {t.files?.length>0?t.files.map((f,i)=><span key={i} className="file-tag">📄 {f.length>12?f.slice(0,12)+'…':f}</span>):<span style={{color:'#D1D5DB',fontSize:'.75rem'}}>—</span>}
                        </td>
                        <td style={{whiteSpace:'nowrap'}}>
                          <button className="btn btn-ghost btn-sm" style={{marginRight:5}} onClick={()=>{setEditTask(t);setShowForm(true);}}>编辑</button>
                          <button className="btn btn-del btn-sm" onClick={()=>del(t.id)}>删除</button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div className="mobile-cards">
              {tasks.map(t=>{
                const ov=t.status!=='completed'&&t.deadline&&new Date(t.deadline)<today;
                return(
                  <div key={t.id} className="m-card">
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',marginBottom:7}}>
                      <div style={{fontWeight:700,flex:1,marginRight:8,fontSize:'.9rem'}}>{t.name}</div>
                      <span className={`badge ${S[t.status]?.cls}`} onClick={()=>cycle(t.id)}>{S[t.status]?.emoji} {S[t.status]?.label}</span>
                    </div>
                    <div style={{fontSize:'.78rem',color:'#6B7280',display:'flex',flexWrap:'wrap',gap:'6px 12px'}}>
                      <span>👤 {t.assignee||'—'}</span>
                      {t.deadline&&<span>📅 {new Date(t.deadline).toLocaleDateString('zh-CN')}{ov&&<span className="ov">逾期</span>}</span>}
                      <span className={P[t.priority]?.cls}>{P[t.priority]?.e} {P[t.priority]?.label}</span>
                    </div>
                    {t.status==='blocked'&&t.blocker&&<div className="task-block" style={{marginTop:5}}>▲ {t.blocker}</div>}
                    {t.files?.length>0&&<div style={{marginTop:5}}>{t.files.map((f,i)=><span key={i} className="file-tag">📄 {f.length>18?f.slice(0,18)+'…':f}</span>)}</div>}
                    <div style={{display:'flex',gap:7,marginTop:9}}>
                      <button className="btn btn-ghost btn-sm" onClick={()=>{setEditTask(t);setShowForm(true);}}>编辑</button>
                      <button className="btn btn-del btn-sm" onClick={()=>del(t.id)}>删除</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </>
        )}
      </div>

      <div className="card">
        <div className="sec-title">数据看板</div>
        <div className="chart-grid">
          <div>
            <div style={{fontSize:'.82rem',color:'#6B7280',fontWeight:600,marginBottom:11}}>状态分布</div>
            <Donut tasks={tasks}/>
          </div>
          <div>
            <div style={{fontSize:'.82rem',color:'#6B7280',fontWeight:600,marginBottom:11}}>优先级分布</div>
            {['high','mid','low'].map(p=>{
              const cnt=tasks.filter(t=>t.priority===p).length;
              const pct=total?cnt/total*100:0;
              return(
                <div key={p} className="pri-bar-wrap">
                  <div className="pri-bar-label"><span className={P[p].cls}>{P[p].e} {P[p].label}优先级</span><span style={{fontWeight:700}}>{cnt}</span></div>
                  <div className="pri-bar-bg"><div className="pri-bar-fill" style={{width:`${pct}%`,background:p==='high'?'#DC2626':p==='mid'?'#D97706':'#16A34A'}}/></div>
                </div>
              );
            })}
            <div className="summary-box">
              <div style={{fontSize:'.78rem',color:'#6B7280',fontWeight:700}}>今日概况</div>
              <div className="summary-grid">
                <div className="summary-cell"><div className="summary-num" style={{color:'#16A34A'}}>{rate}%</div><div className="summary-lbl">完成率</div></div>
                <div className="summary-cell"><div className="summary-num" style={{color:overdue>0?'#DC2626':'#16A34A'}}>{overdue}</div><div className="summary-lbl">逾期任务</div></div>
                <div className="summary-cell"><div className="summary-num" style={{color:'#9F1239'}}>{blocked}</div><div className="summary-lbl">卡点任务</div></div>
                <div className="summary-cell"><div className="summary-num" style={{color:'#1D4ED8'}}>{doing}</div><div className="summary-lbl">进行中</div></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      {showForm&&<TaskForm task={editTask} onSave={save} onClose={()=>{setShowForm(false);setEditTask(null);}}/>}
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
      <Avatar tasks={tasks}/>
      <VoiceFloat tasks={tasks}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
