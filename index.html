<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作任务看板</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --g1:#15803D; --g2:#16A34A; --g3:#22C55E; --g4:#86EFAC; --g5:#DCFCE7; --g6:#F0FDF4;
  --text:#111827; --muted:#6B7280; --border:#D1FAE5; --card:#fff;
  --s-pending:#F3F4F6; --s-pending-t:#4B5563;
  --s-doing:#EFF6FF; --s-doing-t:#2563EB;
  --s-done:#F0FDF4; --s-done-t:#15803D;
  --s-blocked:#FFF1F2; --s-blocked-t:#BE123C;
}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(150deg,#F0FDF4 0%,#F8FAFC 60%,#ECFDF5 100%);min-height:100vh;color:var(--text)}
.app{max-width:1100px;margin:0 auto;padding:28px 16px 130px}

/* Header */
.header{text-align:center;margin-bottom:28px}
.header h1{font-size:1.7rem;font-weight:800;color:var(--g1);letter-spacing:-.5px}
.header p{color:var(--muted);margin-top:5px;font-size:0.88rem}

/* Card */
.card{background:var(--card);border-radius:16px;padding:22px;box-shadow:0 1px 8px rgba(21,128,61,.08);margin-bottom:18px;border:1px solid #E9F7EF}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
.stat-card{border-radius:12px;padding:16px 10px;text-align:center;color:#fff}
.s-total  {background:#475569}
.s-done   {background:#166534}
.s-doing  {background:#1D4ED8}
.s-blocked{background:#9F1239}
.s-overdue{background:#92400E}
.stat-num{font-size:2rem;font-weight:800;line-height:1}
.stat-label{font-size:0.72rem;opacity:.85;margin-top:4px}

/* Progress */
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.prog-rate{font-size:1.2rem;font-weight:800;color:var(--g1)}
.prog-bar{background:#E5E7EB;border-radius:8px;height:8px;overflow:hidden}
.prog-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--g1),var(--g3));transition:width .6s ease}

/* Section */
.sec-title{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.row-between{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}

/* Table */
.task-table{width:100%;border-collapse:collapse}
.task-table th{text-align:left;padding:9px 14px;font-size:0.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);border-bottom:1px solid #E5E7EB}
.task-table td{padding:12px 14px;border-bottom:1px solid #F9FAFB;font-size:0.86rem;vertical-align:middle}
.task-table tr:last-child td{border-bottom:none}
.task-table tr:hover td{background:#FAFAFA}

/* Badge */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:6px;font-size:0.74rem;font-weight:600;cursor:pointer;white-space:nowrap;border:1px solid transparent}
.b-pending  {background:var(--s-pending);color:var(--s-pending-t);border-color:#D1D5DB}
.b-in-progress{background:var(--s-doing);color:var(--s-doing-t);border-color:#BFDBFE}
.b-completed{background:var(--s-done);color:var(--s-done-t);border-color:#BBF7D0}
.b-blocked  {background:var(--s-blocked);color:var(--s-blocked-t);border-color:#FECDD3}

/* Priority */
.p-high{color:#B91C1C;font-weight:700;font-size:.82rem}
.p-mid {color:#B45309;font-weight:700;font-size:.82rem}
.p-low {color:#166534;font-weight:700;font-size:.82rem}

/* Task name cell */
.task-name{font-weight:600;color:var(--text)}
.task-sub{font-size:.74rem;margin-top:2px;color:var(--muted)}
.task-block{font-size:.74rem;margin-top:2px;color:#BE123C}

/* Assignee chip */
.chip{background:#F0FDF4;color:var(--g1);padding:2px 8px;border-radius:5px;font-size:.8rem;font-weight:600;border:1px solid #BBF7D0}

/* Overdue */
.ov{display:inline-block;padding:1px 5px;background:#FEF3C7;color:#92400E;border-radius:4px;font-size:.68rem;font-weight:700;margin-left:5px}

/* File */
.file-tag{display:inline-flex;align-items:center;gap:2px;background:#EFF6FF;color:#1D4ED8;padding:2px 7px;border-radius:5px;font-size:.72rem;margin:2px;border:1px solid #BFDBFE}

/* Buttons */
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:.85rem;font-weight:600;font-family:inherit;transition:all .15s}
.btn-primary{background:var(--g2);color:#fff}
.btn-primary:hover{background:var(--g1);transform:translateY(-1px)}
.btn-ghost{background:#F3F4F6;color:var(--muted)}
.btn-ghost:hover{background:#E5E7EB}
.btn-del{background:#FFF1F2;color:#BE123C}
.btn-del:hover{background:#FFE4E6}
.btn-sm{padding:4px 10px;font-size:.75rem}
.add-btn{display:flex;align-items:center;gap:6px;background:var(--g2);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.add-btn:hover{background:var(--g1)}

/* Form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.full{grid-column:1/-1}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:.78rem;font-weight:700;color:var(--muted)}
.fg input,.fg select,.fg textarea{padding:8px 12px;border:1.5px solid #D1D5DB;border-radius:8px;font-size:.9rem;font-family:inherit;background:#fff;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--g3)}
.fg textarea{resize:vertical;min-height:68px}
.file-zone{border:1.5px dashed var(--g4);border-radius:8px;padding:16px;text-align:center;cursor:pointer;background:var(--g6);transition:background .15s}
.file-zone:hover{background:#DCFCE7}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:2000;backdrop-filter:blur(3px)}
.modal{background:#fff;border-radius:18px;padding:26px;width:92%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,.16)}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-head h2{font-size:1.1rem;font-weight:800;color:var(--g1)}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}

/* Chart */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.chart-legend{display:flex;flex-direction:column;gap:10px}
.leg-item{display:flex;align-items:center;gap:8px;font-size:.83rem}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.leg-count{margin-left:auto;font-weight:700;color:var(--text);padding-left:16px}
.pri-bar-wrap{margin-bottom:12px}
.pri-bar-label{display:flex;justify-content:space-between;margin-bottom:4px;font-size:.8rem}
.pri-bar-bg{background:#F3F4F6;border-radius:5px;height:7px;overflow:hidden}
.pri-bar-fill{height:100%;border-radius:5px;transition:width .5s ease}
.summary-box{background:var(--g6);border-radius:10px;padding:14px;border:1px solid var(--border);margin-top:16px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.summary-cell{text-align:center;background:#fff;border-radius:8px;padding:9px;border:1px solid #E5E7EB}
.summary-num{font-size:1.3rem;font-weight:800}
.summary-lbl{font-size:.7rem;color:#9CA3AF}

/* Empty */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}

/* Toast */
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast{position:fixed;top:18px;right:18px;z-index:9999;padding:11px 18px;border-radius:10px;background:#fff;box-shadow:0 6px 24px rgba(0,0,0,.12);display:flex;align-items:center;gap:7px;animation:slideIn .25s ease;font-size:.85rem;font-weight:600;border-left:3px solid var(--g2)}

/* ========= WALL-E AVATAR ========= */
@keyframes walleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes walleBlink{0%,78%,100%{transform:scaleY(1)}86%{transform:scaleY(0.06)}}
@keyframes walleTilt{0%,55%,100%{transform:rotate(0deg) translateX(-50%)}68%{transform:rotate(-20deg) translateX(-50%)}80%{transform:rotate(14deg) translateX(-50%)}}
@keyframes walleLens{0%,100%{box-shadow:0 0 6px rgba(91,184,232,.5)}50%{box-shadow:0 0 14px rgba(91,184,232,.9),0 0 4px #fff}}
@keyframes walleRipple{0%{transform:scale(.8);opacity:1}100%{transform:scale(2.4);opacity:0}}
@keyframes redBlink{0%,100%{opacity:1;box-shadow:0 0 4px currentColor}50%{opacity:.2;box-shadow:none}}

.av-wrap{position:fixed;bottom:26px;right:26px;z-index:1000;cursor:pointer;user-select:none}
.av-bubble{position:absolute;bottom:144px;right:0;background:#fff;border-radius:14px 14px 0 14px;padding:10px 13px;width:178px;font-size:.78rem;line-height:1.5;color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,.1);border:1.5px solid #FDE68A;animation:walleFloat 3.2s ease-in-out infinite}
.av-ripple{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:112px;height:112px;border-radius:50%;background:rgba(212,152,10,.15);animation:walleRipple 1.4s ease-out infinite;pointer-events:none}

/* WALL-E character */
.walle{width:90px;height:130px;position:relative;overflow:visible;animation:walleFloat 3.2s ease-in-out infinite;filter:drop-shadow(0 8px 22px rgba(160,110,0,.32))}

/* Caterpillar tracks */
.wt{position:absolute;bottom:0;left:1px;width:88px;height:17px;background:#1A1A1A;border-radius:8px;overflow:hidden}
.wt::before{content:'';position:absolute;top:4px;left:5px;right:5px;height:9px;background:repeating-linear-gradient(90deg,#2C2C2C 0,#2C2C2C 10px,#111 10px,#111 20px);border-radius:4px}
.wt-w{position:absolute;top:50%;transform:translateY(-50%);width:11px;height:11px;background:#2E2E2E;border-radius:50%;border:1px solid #444}
.wt-w.l{left:7px}
.wt-w.r{right:7px}

/* Body block */
.wb{position:absolute;bottom:15px;left:9px;width:72px;height:50px;background:linear-gradient(160deg,#E0A40C 0%,#C88A09 50%,#A67208 100%);border-radius:6px;border:2px solid #7A5408;box-shadow:inset 0 1px 0 rgba(255,255,255,.18),inset 0 -2px 0 rgba(0,0,0,.18)}
/* Horizontal seam line */
.wb::before{content:'';position:absolute;top:50%;left:5px;right:5px;height:1px;background:rgba(0,0,0,.22)}
/* Body panel with LEDs */
.wbp{position:absolute;top:7px;left:50%;transform:translateX(-50%);width:46px;height:18px;background:#7A5408;border-radius:3px;border:1px solid #5C3D06;display:flex;align-items:center;justify-content:center;gap:7px}
.wbpl{width:9px;height:9px;border-radius:50%}
.wbpl.r{color:#E74C3C;background:#E74C3C;box-shadow:0 0 5px #E74C3C;animation:redBlink 1.6s ease-in-out infinite}
.wbpl.g{color:#27AE60;background:#27AE60;box-shadow:0 0 5px #27AE60;animation:redBlink 2.2s ease-in-out infinite .7s}

/* Head block */
.wh{position:absolute;bottom:63px;left:9px;width:72px;height:42px;background:linear-gradient(145deg,#DDA00C,#C88A09);border-radius:6px;border:2px solid #7A5408;box-shadow:inset 0 1px 0 rgba(255,255,255,.14),inset 0 -1px 0 rgba(0,0,0,.14);overflow:visible}
.wh::after{content:'';position:absolute;bottom:9px;left:8px;right:8px;height:1px;background:rgba(0,0,0,.18)}
/* Corner rivets */
.wr{position:absolute;width:5px;height:5px;background:#7A5408;border-radius:50%;top:4px}
.wr.l{left:5px}
.wr.r{right:5px}

/* Speaker bars (VU meter when talking) */
.whs{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);display:flex;gap:3px;align-items:flex-end}
.whsg{width:3px;background:rgba(0,0,0,.35);border-radius:1px;min-height:2px;transition:height .08s}

/* EYE ASSEMBLY — the iconic WALL-E binoculars */
.we{position:absolute;top:-30px;left:50%;transform:translateX(-50%);display:flex;gap:4px;transform-origin:50% 100%}
.we.tilt{animation:walleTilt 5.5s ease-in-out infinite 1.5s}
/* Eye bridge connector */
.web{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:52px;height:5px;background:#2A2A2A;border-radius:2px;z-index:0}
/* Single eye cylinder */
.weu{width:30px;height:30px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#585858,#1E1E1E);border:3px solid #3A3A3A;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 8px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.08);position:relative;z-index:1}
/* Iris */
.wei{width:21px;height:21px;border-radius:50%;background:#080E14;display:flex;align-items:center;justify-content:center;animation:walleBlink 5.5s ease-in-out infinite}
/* Lens — beautiful blue WALL-E eyes */
.wel{width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 32% 28%,#D0EEFA,#5BB8E8 45%,#1867A8 80%,#0A3560 100%);animation:walleLens 2.8s ease-in-out infinite;position:relative}
.wel::after{content:'';position:absolute;width:4px;height:4px;background:rgba(255,255,255,.88);border-radius:50%;top:2px;right:2px}

/* Mobile */
@media(max-width:768px){
  .app{padding:14px 11px 130px}
  .header h1{font-size:1.3rem}
  .stats-grid{grid-template-columns:repeat(3,1fr);gap:9px}
  .stat-num{font-size:1.6rem}
  .stat-label{font-size:.68rem}
  .card{padding:14px;border-radius:13px}
  .chart-grid{grid-template-columns:1fr}
  .task-table{display:none}
  .mobile-cards{display:block!important}
  .form-grid{grid-template-columns:1fr}
  .row-between{flex-direction:column;align-items:stretch;gap:10px}
  .add-btn{justify-content:center}
  .overlay{align-items:flex-end}
  .modal{border-radius:18px 18px 0 0;max-height:93vh;width:100%;max-width:100%}
  .av-wrap{bottom:14px;right:14px}
  .av-bubble{width:155px;font-size:.74rem;bottom:130px}
}
@media(max-width:420px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
}
.mobile-cards{display:none}
.m-card{background:#fff;border-radius:11px;padding:13px;margin-bottom:9px;box-shadow:0 1px 6px rgba(0,0,0,.06);border:1px solid #F3F4F6}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const DEMO=[
  {id:1,name:'完成Q1季度报告',assignee:'张三',deadline:'2026-03-31',priority:'high',status:'in-progress',blocker:'',files:['Q1草稿.docx'],notes:'需要包含销售数据和市场分析',createdAt:'2026-03-20'},
  {id:2,name:'产品原型设计评审',assignee:'李四',deadline:'2026-03-28',priority:'mid',status:'completed',blocker:'',files:['prototype_v2.fig'],notes:'已完成3轮修改，获得团队认可',createdAt:'2026-03-18'},
  {id:3,name:'后端API性能优化',assignee:'王五',deadline:'2026-04-05',priority:'high',status:'blocked',blocker:'等待DBA团队提供数据库优化方案，预计明天到位',files:[],notes:'接口响应时间需从2s降至500ms',createdAt:'2026-03-22'},
  {id:4,name:'新员工培训材料整理',assignee:'赵六',deadline:'2026-04-10',priority:'low',status:'pending',blocker:'',files:[],notes:'包含公司文化、流程规范、工具使用说明',createdAt:'2026-03-24'},
];

const S={
  'pending':     {label:'未开始',cls:'b-pending',    emoji:'⏳'},
  'in-progress': {label:'进行中',cls:'b-in-progress',emoji:'🔄'},
  'completed':   {label:'已完成',cls:'b-completed',  emoji:'✅'},
  'blocked':     {label:'已卡点',cls:'b-blocked',    emoji:'🚧'},
};
const P={high:{label:'高',cls:'p-high',e:'↑'},mid:{label:'中',cls:'p-mid',e:'—'},low:{label:'低',cls:'p-low',e:'↓'}};
const SCYCLE=['pending','in-progress','completed','blocked'];
const SCOL={pending:'#9CA3AF','in-progress':'#3B82F6',completed:'#16A34A',blocked:'#E11D48'};

/* Donut */
function Donut({tasks}){
  const cnt={pending:0,'in-progress':0,completed:0,blocked:0};
  tasks.forEach(t=>cnt[t.status]=(cnt[t.status]||0)+1);
  const total=tasks.length||1,sz=126,r=46,cx=sz/2,cy=sz/2,circ=2*Math.PI*r;
  let off=0;
  const segs=Object.entries(cnt).map(([k,v])=>{
    const pct=v/total,d=pct*circ,g=circ-d,o=off*circ;
    off+=pct; return {k,v,color:SCOL[k],d,g,o};
  });
  return(
    <div style={{display:'flex',alignItems:'center',gap:22,flexWrap:'wrap'}}>
      <svg width={sz} height={sz}>
        {tasks.length===0
          ?<circle cx={cx} cy={cy} r={r} fill="none" stroke="#E5E7EB" strokeWidth={16}/>
          :segs.map(s=><circle key={s.k} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth={16}
              strokeDasharray={`${s.d} ${s.g}`} strokeDashoffset={-s.o}
              transform={`rotate(-90 ${cx} ${cy})`} style={{transition:'stroke-dasharray .5s'}}/>)}
        <text x={cx} y={cy-5} textAnchor="middle" fontSize="19" fontWeight="800" fill="#111827">{tasks.length}</text>
        <text x={cx} y={cy+11} textAnchor="middle" fontSize="9" fill="#9CA3AF">总任务数</text>
      </svg>
      <div className="chart-legend">
        {Object.entries(cnt).map(([k,v])=>(
          <div key={k} className="leg-item">
            <div className="leg-dot" style={{background:SCOL[k]}}/>
            <span style={{color:'#6B7280'}}>{S[k].label}</span>
            <span className="leg-count">{v}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* WALL-E Avatar */
function Avatar({tasks}){
  const [talking,setTalking]=useState(false);
  const [tilt,setTilt]=useState(false);
  const [ripple,setRipple]=useState(false);
  const [bubble,setBubble]=useState('嘟嘟~ 点我听汇报');
  const [bars,setBars]=useState([2,4,2,4,2]);

  const beep=(freq,dur,delay=0)=>{
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      const osc=ctx.createOscillator(),gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type='sine';osc.frequency.setValueAtTime(freq,ctx.currentTime+delay);
      gain.gain.setValueAtTime(0,ctx.currentTime+delay);
      gain.gain.linearRampToValueAtTime(0.18,ctx.currentTime+delay+0.01);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+dur);
      osc.start(ctx.currentTime+delay);osc.stop(ctx.currentTime+delay+dur+0.05);
    }catch(e){}
  };

  // WALL-E's signature ascending greeting beeps
  const walleHello=()=>{beep(440,.1,0);beep(587,.1,.14);beep(880,.2,.28);};
  // WALL-E's satisfied descending end tone
  const walleDone=()=>{beep(880,.08,0);beep(659,.08,.11);beep(523,.22,.22);};

  const genReport=()=>{
    const total=tasks.length;
    if(!total) return '老板好，目前暂无任务，可以点击新建任务开始工作规划。';
    const done=tasks.filter(t=>t.status==='completed').length;
    const doing=tasks.filter(t=>t.status==='in-progress').length;
    const blocked=tasks.filter(t=>t.status==='blocked').length;
    const pending=tasks.filter(t=>t.status==='pending').length;
    const rate=Math.round(done/total*100);
    const today=new Date();today.setHours(0,0,0,0);
    const overdue=tasks.filter(t=>t.status!=='completed'&&t.deadline&&new Date(t.deadline)<today);
    let r=`老板，您好。以下是当前工作进度汇报。共有${total}项任务，整体完成率${rate}%。`;
    r+=`其中已完成${done}项，进行中${doing}项，未开始${pending}项。`;
    if(blocked>0){
      r+=`有${blocked}项任务存在卡点，请重点关注。`;
      tasks.filter(t=>t.status==='blocked').forEach(t=>{
        r+=t.blocker?`"${t.name}"卡点为：${t.blocker}。`:`"${t.name}"卡点原因待补充。`;
      });
    }
    if(overdue.length>0) r+=`另有${overdue.length}项任务已逾期，建议及时跟进。`;
    if(rate===100) r+='所有任务均已完成，团队工作推进顺利。';
    else if(rate>=70) r+='整体进展正常，请放心。';
    else if(rate>=40) r+='多数任务仍在推进中，团队正在努力跟进。';
    else r+='任务较多，团队会加快推进节奏。';
    return r;
  };

  const speak=()=>{
    if(!('speechSynthesis' in window)){setBubble('浏览器暂不支持语音');return;}
    window.speechSynthesis.cancel();
    walleHello();
    setTilt(true);setRipple(true);
    const total=tasks.length,done=tasks.filter(t=>t.status==='completed').length;
    const rate=total?Math.round(done/total*100):0;
    setBubble(total===0?'暂无任务，快去添加！':`${total}项任务 · 完成${rate}%`);
    setTimeout(()=>{
      const utt=new SpeechSynthesisUtterance(genReport());
      utt.lang='zh-CN';utt.rate=0.95;utt.pitch=1.05;utt.volume=1;
      const voices=window.speechSynthesis.getVoices();
      const v=voices.find(v=>v.lang.startsWith('zh')&&(v.name.includes('Ting')||v.name.includes('Xiao')||v.name.includes('女')||v.name.includes('Female')))||voices.find(v=>v.lang.startsWith('zh'));
      if(v) utt.voice=v;
      setTalking(true);
      const barTimer=setInterval(()=>setBars([...Array(5)].map(()=>Math.floor(Math.random()*7)+2)),130);
      utt.onend=()=>{
        clearInterval(barTimer);setTalking(false);setRipple(false);setBars([2,4,2,4,2]);
        walleDone();
        setBubble('汇报完毕，随时待命 ✅');
        setTimeout(()=>{setTilt(false);setBubble('嘟嘟~ 点我听汇报');},3000);
      };
      window.speechSynthesis.speak(utt);
    },560);
  };

  return(
    <div className="av-wrap" onClick={speak} title="点击收听工作汇报">
      <div className="av-bubble">{bubble}</div>
      {ripple&&<div className="av-ripple"/>}
      <div className="walle">
        {/* Tracks */}
        <div className="wt"><div className="wt-w l"/><div className="wt-w r"/></div>
        {/* Body */}
        <div className="wb"><div className="wbp"><div className="wbpl r"/><div className="wbpl g"/></div></div>
        {/* Head */}
        <div className="wh">
          <div className="wr l"/><div className="wr r"/>
          {/* WALL-E binocular eyes */}
          <div className={`we${tilt?' tilt':''}`}>
            <div className="web"/>
            <div className="weu"><div className="wei"><div className="wel"/></div></div>
            <div className="weu"><div className="wei"><div className="wel"/></div></div>
          </div>
          {/* Speaker VU bars */}
          <div className="whs">{bars.map((h,i)=><div key={i} className="whsg" style={{height:`${h}px`}}/>)}</div>
        </div>
      </div>
    </div>
  );
}

/* Task Form */
function TaskForm({task,onSave,onClose}){
  const [f,setF]=useState(task||{name:'',assignee:'',deadline:'',priority:'mid',status:'pending',blocker:'',files:[],notes:''});
  const fileRef=useRef(null);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const onFile=e=>{const ns=Array.from(e.target.files).map(x=>x.name);setF(p=>({...p,files:[...p.files,...ns]}));};
  const submit=e=>{e.preventDefault();if(!f.name.trim())return;onSave({...f,id:task?.id||Date.now(),createdAt:task?.createdAt||new Date().toISOString().split('T')[0]});};
  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-head">
          <h2>{task?'编辑任务':'新建任务'}</h2>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        <form onSubmit={submit}>
          <div className="form-grid">
            <div className="fg full"><label>任务名称 *</label><input type="text" placeholder="请输入任务名称" value={f.name} onChange={e=>set('name',e.target.value)} required/></div>
            <div className="fg"><label>负责人</label><input type="text" placeholder="负责人姓名" value={f.assignee} onChange={e=>set('assignee',e.target.value)}/></div>
            <div className="fg"><label>截止日期</label><input type="date" value={f.deadline} onChange={e=>set('deadline',e.target.value)}/></div>
            <div className="fg"><label>优先级</label>
              <select value={f.priority} onChange={e=>set('priority',e.target.value)}>
                <option value="high">高优先级</option><option value="mid">中优先级</option><option value="low">低优先级</option>
              </select>
            </div>
            <div className="fg"><label>完成状态</label>
              <select value={f.status} onChange={e=>set('status',e.target.value)}>
                <option value="pending">未开始</option><option value="in-progress">进行中</option><option value="completed">已完成</option><option value="blocked">已卡点</option>
              </select>
            </div>
            {f.status==='blocked'&&<div className="fg full"><label>卡点描述</label><textarea placeholder="描述卡点原因及所需支持..." value={f.blocker} onChange={e=>set('blocker',e.target.value)}/></div>}
            <div className="fg full"><label>备注反馈</label><textarea placeholder="进展说明、备注信息..." value={f.notes} onChange={e=>set('notes',e.target.value)}/></div>
            <div className="fg full"><label>上传交付文件</label>
              <div className="file-zone" onClick={()=>fileRef.current?.click()}>
                <input ref={fileRef} type="file" multiple style={{display:'none'}} onChange={onFile}/>
                <div style={{color:'#16A34A',fontWeight:700,marginBottom:2}}>📎 点击上传交付文件</div>
                <div style={{color:'#9CA3AF',fontSize:'.75rem'}}>支持多文件</div>
              </div>
              {f.files.length>0&&<div style={{marginTop:7}}>{f.files.map((n,i)=><span key={i} className="file-tag">📄 {n.length>22?n.slice(0,22)+'…':n}<span style={{cursor:'pointer',color:'#BE123C',marginLeft:3}} onClick={e=>{e.stopPropagation();setF(p=>({...p,files:p.files.filter((_,j)=>j!==i)}));}}>✕</span></span>)}</div>}
            </div>
          </div>
          <div className="modal-foot">
            <button type="button" className="btn btn-ghost" onClick={onClose}>取消</button>
            <button type="submit" className="btn btn-primary">{task?'保存修改':'创建任务'}</button>
          </div>
        </form>
      </div>
    </div>
  );
}

function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,2500);return()=>clearTimeout(t);},[]);
  return <div className="toast">✓ {msg}</div>;
}

function App(){
  const [tasks,setTasks]=useState(()=>{try{const s=localStorage.getItem('tkv3');return s?JSON.parse(s):DEMO;}catch{return DEMO;}});
  const [showForm,setShowForm]=useState(false);
  const [editTask,setEditTask]=useState(null);
  const [toast,setToast]=useState(null);

  useEffect(()=>{localStorage.setItem('tkv3',JSON.stringify(tasks));},[tasks]);

  const notify=msg=>setToast(msg);
  const save=t=>{
    if(editTask){setTasks(p=>p.map(x=>x.id===t.id?t:x));notify('任务已更新');}
    else{setTasks(p=>[...p,t]);notify('任务已创建');}
    setShowForm(false);setEditTask(null);
  };
  const del=id=>{if(confirm('确认删除此任务？')){setTasks(p=>p.filter(t=>t.id!==id));notify('已删除');}};
  const cycle=id=>setTasks(p=>p.map(t=>{if(t.id!==id)return t;const i=(SCYCLE.indexOf(t.status)+1)%SCYCLE.length;return{...t,status:SCYCLE[i]};}));

  const today=new Date();today.setHours(0,0,0,0);
  const total=tasks.length;
  const done=tasks.filter(t=>t.status==='completed').length;
  const doing=tasks.filter(t=>t.status==='in-progress').length;
  const blocked=tasks.filter(t=>t.status==='blocked').length;
  const overdue=tasks.filter(t=>t.status!=='completed'&&t.deadline&&new Date(t.deadline)<today).length;
  const rate=total?Math.round(done/total*100):0;

  return(
    <div className="app">
      <div className="header">
        <h1>工作任务看板</h1>
        <p>任务追踪 · 进度管理 · 交付物上传 · 卡点反馈</p>
      </div>

      <div className="stats-grid">
        <div className="stat-card s-total"><div className="stat-num">{total}</div><div className="stat-label">全部任务</div></div>
        <div className="stat-card s-done"><div className="stat-num">{done}</div><div className="stat-label">已完成</div></div>
        <div className="stat-card s-doing"><div className="stat-num">{doing}</div><div className="stat-label">进行中</div></div>
        <div className="stat-card s-blocked"><div className="stat-num">{blocked}</div><div className="stat-label">已卡点</div></div>
        <div className="stat-card s-overdue"><div className="stat-num">{overdue}</div><div className="stat-label">逾期中</div></div>
      </div>

      <div className="card">
        <div className="prog-row"><span style={{fontWeight:700,fontSize:'.9rem'}}>整体完成率</span><span className="prog-rate">{rate}%</span></div>
        <div className="prog-bar"><div className="prog-fill" style={{width:`${rate}%`}}/></div>
      </div>

      <div className="card">
        <div className="row-between">
          <div className="sec-title">任务列表</div>
          <button className="add-btn" onClick={()=>{setEditTask(null);setShowForm(true);}}>＋ 新建任务</button>
        </div>
        {tasks.length===0?(
          <div className="empty"><div style={{fontSize:'2.5rem',marginBottom:10}}>📋</div><div style={{fontWeight:600,marginBottom:4}}>暂无任务</div><div style={{fontSize:'.83rem'}}>点击「新建任务」开始添加</div></div>
        ):(
          <>
            <div style={{overflowX:'auto'}}>
              <table className="task-table">
                <thead><tr><th>任务</th><th>负责人</th><th>截止日期</th><th>优先级</th><th>状态</th><th>交付文件</th><th></th></tr></thead>
                <tbody>
                  {tasks.map(t=>{
                    const ov=t.status!=='completed'&&t.deadline&&new Date(t.deadline)<today;
                    return(
                      <tr key={t.id}>
                        <td style={{maxWidth:260}}>
                          <div className="task-name">{t.name}</div>
                          {t.status==='blocked'&&t.blocker&&<div className="task-block">▲ {t.blocker}</div>}
                          {t.notes&&<div className="task-sub">{t.notes.length>48?t.notes.slice(0,48)+'…':t.notes}</div>}
                        </td>
                        <td><span className="chip">{t.assignee||'—'}</span></td>
                        <td style={{whiteSpace:'nowrap',fontSize:'.82rem'}}>
                          {t.deadline?new Date(t.deadline).toLocaleDateString('zh-CN'):'—'}
                          {ov&&<span className="ov">逾期</span>}
                        </td>
                        <td><span className={P[t.priority]?.cls}>{P[t.priority]?.e} {P[t.priority]?.label}</span></td>
                        <td><span className={`badge ${S[t.status]?.cls}`} onClick={()=>cycle(t.id)} title="点击切换状态">{S[t.status]?.emoji} {S[t.status]?.label}</span></td>
                        <td style={{minWidth:80}}>
                          {t.files?.length>0?t.files.map((f,i)=><span key={i} className="file-tag">📄 {f.length>12?f.slice(0,12)+'…':f}</span>):<span style={{color:'#D1D5DB',fontSize:'.75rem'}}>—</span>}
                        </td>
                        <td style={{whiteSpace:'nowrap'}}>
                          <button className="btn btn-ghost btn-sm" style={{marginRight:5}} onClick={()=>{setEditTask(t);setShowForm(true);}}>编辑</button>
                          <button className="btn btn-del btn-sm" onClick={()=>del(t.id)}>删除</button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div className="mobile-cards">
              {tasks.map(t=>{
                const ov=t.status!=='completed'&&t.deadline&&new Date(t.deadline)<today;
                return(
                  <div key={t.id} className="m-card">
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',marginBottom:7}}>
                      <div style={{fontWeight:700,flex:1,marginRight:8,fontSize:'.9rem'}}>{t.name}</div>
                      <span className={`badge ${S[t.status]?.cls}`} onClick={()=>cycle(t.id)}>{S[t.status]?.emoji} {S[t.status]?.label}</span>
                    </div>
                    <div style={{fontSize:'.78rem',color:'#6B7280',display:'flex',flexWrap:'wrap',gap:'6px 12px'}}>
                      <span>👤 {t.assignee||'—'}</span>
                      {t.deadline&&<span>📅 {new Date(t.deadline).toLocaleDateString('zh-CN')}{ov&&<span className="ov">逾期</span>}</span>}
                      <span className={P[t.priority]?.cls}>{P[t.priority]?.e} {P[t.priority]?.label}</span>
                    </div>
                    {t.status==='blocked'&&t.blocker&&<div className="task-block" style={{marginTop:5}}>▲ {t.blocker}</div>}
                    {t.files?.length>0&&<div style={{marginTop:5}}>{t.files.map((f,i)=><span key={i} className="file-tag">📄 {f.length>18?f.slice(0,18)+'…':f}</span>)}</div>}
                    <div style={{display:'flex',gap:7,marginTop:9}}>
                      <button className="btn btn-ghost btn-sm" onClick={()=>{setEditTask(t);setShowForm(true);}}>编辑</button>
                      <button className="btn btn-del btn-sm" onClick={()=>del(t.id)}>删除</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </>
        )}
      </div>

      <div className="card">
        <div className="sec-title">数据看板</div>
        <div className="chart-grid">
          <div>
            <div style={{fontSize:'.82rem',color:'#6B7280',fontWeight:600,marginBottom:11}}>状态分布</div>
            <Donut tasks={tasks}/>
          </div>
          <div>
            <div style={{fontSize:'.82rem',color:'#6B7280',fontWeight:600,marginBottom:11}}>优先级分布</div>
            {['high','mid','low'].map(p=>{
              const cnt=tasks.filter(t=>t.priority===p).length;
              const pct=total?cnt/total*100:0;
              return(
                <div key={p} className="pri-bar-wrap">
                  <div className="pri-bar-label"><span className={P[p].cls}>{P[p].e} {P[p].label}优先级</span><span style={{fontWeight:700}}>{cnt}</span></div>
                  <div className="pri-bar-bg"><div className="pri-bar-fill" style={{width:`${pct}%`,background:p==='high'?'#DC2626':p==='mid'?'#D97706':'#16A34A'}}/></div>
                </div>
              );
            })}
            <div className="summary-box">
              <div style={{fontSize:'.78rem',color:'#6B7280',fontWeight:700}}>今日概况</div>
              <div className="summary-grid">
                <div className="summary-cell"><div className="summary-num" style={{color:'#16A34A'}}>{rate}%</div><div className="summary-lbl">完成率</div></div>
                <div className="summary-cell"><div className="summary-num" style={{color:overdue>0?'#DC2626':'#16A34A'}}>{overdue}</div><div className="summary-lbl">逾期任务</div></div>
                <div className="summary-cell"><div className="summary-num" style={{color:'#9F1239'}}>{blocked}</div><div className="summary-lbl">卡点任务</div></div>
                <div className="summary-cell"><div className="summary-num" style={{color:'#1D4ED8'}}>{doing}</div><div className="summary-lbl">进行中</div></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      {showForm&&<TaskForm task={editTask} onSave={save} onClose={()=>{setShowForm(false);setEditTask(null);}}/>}
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
      <Avatar tasks={tasks}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
